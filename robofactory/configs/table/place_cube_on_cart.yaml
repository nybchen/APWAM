# camera.set_local_pose(Pose([0.453538, -0.482309, 0.770908], [0.293164, -0.184901, 0.057941, 0.936221]))
      - 
        uid: head_camera_global
        pose:
          type: pose
          params: [[0.453538, -0.482309, 0.770908], [0.293164, -0.184901, 0.057941, 0.936221]]
