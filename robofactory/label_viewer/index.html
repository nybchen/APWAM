<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RoboFactory Mode Label Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --ink: #17202a;
      --muted: #637083;
      --line: #d8dee8;
      --action: #2563eb;
      --perception: #0f8b5f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      line-height: 1.15;
      margin: 0;
      font-weight: 700;
      letter-spacing: 0;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) minmax(120px, 180px) auto auto;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }
    select, button, input[type="range"] {
      height: 36px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      color: var(--ink);
      font: inherit;
    }
    select { padding: 0 10px; }
    button {
      min-width: 72px;
      padding: 0 12px;
      cursor: pointer;
    }
    .stage {
      background: #111827;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      border: 1px solid #111827;
    }
    video {
      display: block;
      width: 100%;
      max-height: 70vh;
      background: #111827;
    }
    .badge {
      position: absolute;
      left: 14px;
      top: 14px;
      padding: 7px 10px;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0;
    }
    .badge.action { background: var(--action); }
    .badge.perception { background: var(--perception); }
    .meta {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin: 14px 0;
    }
    .metric {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 12px;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 3px;
    }
    .metric strong {
      font-size: 16px;
      letter-spacing: 0;
    }
    .timeline {
      display: grid;
      grid-template-columns: repeat(var(--n), minmax(1px, 1fr));
      height: 22px;
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: var(--panel);
    }
    .tick.action { background: var(--action); }
    .tick.perception { background: var(--perception); }
    .tick.current { outline: 2px solid #111827; outline-offset: -2px; }
    .agent-labels {
      display: grid;
      gap: 10px;
      margin-top: 12px;
    }
    .agent-row {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .agent-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 8px;
    }
    .agent-name {
      font-weight: 700;
      font-size: 14px;
    }
    .agent-mode {
      padding: 5px 8px;
      border-radius: 6px;
      color: #fff;
      font-weight: 700;
      font-size: 12px;
      text-transform: uppercase;
    }
    .agent-mode.action { background: var(--action); }
    .agent-mode.perception { background: var(--perception); }
    .empty {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
    }
    @media (max-width: 760px) {
      main { padding: 14px; }
      header, .controls { grid-template-columns: 1fr; display: grid; }
      .meta { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

    function renderEmpty(text) {
      content.innerHTML = `<div class="empty">${text}</div>`;
    }

    function selectDemo() {
      const task = taskSelect.value;

    function renderSelectors() {

        const demos = state.demos.filter(d => d.task === taskSelect.value);

        <div class="meta">

          <div class="metric"><span>Trajectory</span><strong>traj_${d.traj}</strong></div>
          <div class="metric"><span>Frame</span><strong id="frame">0 / ${Math.max(n - 1, 0)}</strong></div>

      const ticks = [...document.querySelectorAll(".tick")];
      function setFrame(i, seek) {

        }
        frame.textContent = `${i} / ${Math.max(n - 1, 0)}`;
