# Pick meat from microwave: all agents use camera of agent 1 (observation agent)
name: pick_meat_from_microwave_local_single_cam
agent_num: 3

camera_assignment: [0,0,0]

image_shape: &image_shape [3, 240, 320]
action_shape: &action_shape [8]

shape_meta: &shape_meta
  obs:
    head_cam:
      shape: *image_shape
      type: rgb
    state:
      shape: *action_shape
      type: low_dim
  action:
    shape: *action_shape

dataset:
  _target_: dataset.dataset2d.Dataset2D
  dataset_path: /home/nybchen/MARS/MAAP/Policy-Lightning-main/data/pick_meat_from_microwave.h5
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  input_meta:
    obs:
      head_cam_0: *image_shape
      head_cam_1: *image_shape
      head_cam_2: *image_shape
      state_0: *action_shape
      state_1: *action_shape
      state_2: *action_shape
    action_0: *action_shape
    action_1: *action_shape
    action_2: *action_shape
  seperate_action: True
  use_mem: False
